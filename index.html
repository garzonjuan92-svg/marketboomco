<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <h1 class="titulo">Market Boom Co ✨</h1>

<div class="productos" id="contenedor-productos"></div>

<div class="boton-carrito" onclick="abrirCarrito()">
  🛒 <span id="contador">0</span>
</div>

<div id="overlay" onclick="cerrarCarrito()"></div>

<!-- =========================
     CARRITO
========================= -->

<div id="carrito">
  <h2>🛒 Carrito</h2>
  <div id="lista-carrito"></div>

  <button class="vaciar" onclick="vaciarCarrito()">
    Vaciar carrito
  </button>

  <button class="whatsapp-carrito" onclick="abrirWhatsApp()">
    Enviar pedido por WhatsApp
  </button>
</div>

<!-- =========================
     MODAL PRODUCTO
========================= -->

<div id="modal-producto" class="modal">
  <div class="modal-contenido">
    
    <span class="cerrar-modal" onclick="cerrarModal()">✕</span>

    <img id="modal-imagen-principal" class="modal-imagen-principal">

    <div id="modal-miniaturas" class="modal-miniaturas"></div>

    <h2 id="modal-nombre"></h2>
    <p id="modal-precio" class="modal-precio"></p>

    <button id="modal-agregar" class="btn-agregar-modal">
      Agregar al carrito
    </button>

  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
